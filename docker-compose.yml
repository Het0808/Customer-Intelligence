version: "3.9"

services:
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: customer-intelligence:latest
    ports:
      - "8000:8000"
    volumes:
      # Mount local mlruns/ read-only so the container reads trained models
      # without needing them baked into the image.
      - ./mlruns:/app/mlruns:ro
    environment:
      - MLFLOW_TRACKING_URI=file:/app/mlruns
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-customer-intelligence}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
