name: CI

on:
  push:
    branches: [main, dev-het, dev]
  pull_request:
    branches: [main]

jobs:
  pipeline-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Schema smoke tests ─────────────────────────────────────────────────
      # Uses the committed 500-row sample — no network, no download.
      - name: Validate committed sample (expect PASS)
        env:
          DATA_DIR: ${{ github.workspace }}/data
        run: python -m src.data_pipeline.validate --sample

      # The injected bad record MUST be rejected. We invert the exit code:
      # if validate returns 0 (passed) something is wrong and CI should fail.
      - name: Validate with injected bad record (expect FAIL → CI passes)
        env:
          DATA_DIR: ${{ github.workspace }}/data
        run: |
          if python -m src.data_pipeline.validate --sample --inject-bad; then
            echo "ERROR: Schema accepted bad records — business rules are broken!" >&2
            exit 1
          else
            echo "OK: Bad records correctly rejected by schema."
          fi

      # ── Phase 2: training smoke test (500-row sample, fast) ──────────────
      # Trains LR + XGBoost on the committed sample. Gate PROMOTED exit=0.
      - name: Train models on sample (expect PROMOTED → exit 0)
        env:
          DATA_DIR: ${{ github.workspace }}/data
          MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
        run: python -m src.training.train --sample

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: Run pytest
        env:
          DATA_DIR: ${{ github.workspace }}/data
          MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
